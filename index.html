<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raya Open House Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2e8b57;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .details {
            font-size: 16px;
            margin: 10px 0;
        }

        .footer {
            margin-top: 20px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌙 Hari Raya Open House 🌙</h1>
        <p class="subtitle">You are warmly invited!</p>

        <p class="details"><strong>Host:</strong> Nik Maisara Faireen</p>
        <p class="details"><strong>Date:</strong> 20 April 2026</p>
        <p class="details"><strong>Time:</strong> 12:00 PM – 5:00 PM</p>
        <p class="details"><strong>Location:</strong> Sepang, Selangor</p>

        <p class="footer">Selamat Hari Raya Aidilfitri ✨</p>
    </div>

</body>
</html>
